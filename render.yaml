services:
  - type: web
    name: carwash-platform
    runtime: node
    plan: free
    region: oregon
    branch: main
    autoDeployTrigger: off
    buildCommand: npm ci --ignore-scripts --no-audit --no-fund && npm run build
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: 22.16.0
      - key: NODE_ENV
        value: production
